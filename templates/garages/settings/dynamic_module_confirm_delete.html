{% extends "base.html" %}
{% block title %}Modul törlése — CarCare{% endblock %}
{% block content %}
<div class="mb-3">
  <a href="{% url 'garages:settings' garage.slug %}" class="btn btn-sm btn-outline-secondary">← Beállítások</a>
</div>
<div class="card shadow-sm border-danger" style="max-width:480px">
  <div class="card-body">
    <h4 class="card-title text-danger">Modul törlése</h4>
    <p>Modul törlése <strong>{{ object.name }}</strong> és az összes adatrekordja?</p>
    <form method="post" class="d-flex gap-2 mt-4">
      {% csrf_token %}
      <button type="submit" class="btn btn-danger">Törlés</button>
      <a href="{% url 'garages:settings' garage.slug %}" class="btn btn-outline-secondary">Mégse</a>
    </form>
  </div>
</div>
{% endblock %}
