{% extends "base.html" %}
{% block title %}Mező törlése — CarCare{% endblock %}
{% block content %}
<div class="mb-3">
  <a href="{% url 'garages:dynamic_module_fields' garage.slug module.pk %}" class="btn btn-sm btn-outline-secondary">← Vissza</a>
</div>
<div class="card shadow-sm border-danger" style="max-width:480px">
  <div class="card-body">
    <h4 class="card-title text-danger">Mező törlése</h4>
    <p>Mező törlése <strong>{{ object.label }}</strong> -tól <strong>{{ module.name }}</strong>?</p>
    <form method="post" class="d-flex gap-2 mt-4">
      {% csrf_token %}
      <button type="submit" class="btn btn-danger">Törlés</button>
      <a href="{% url 'garages:dynamic_module_fields' garage.slug module.pk %}" class="btn btn-outline-secondary">Mégse</a>
    </form>
  </div>
</div>
{% endblock %}
